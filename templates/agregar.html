<!DOCTYPE html>
<html>
<head>
    <title>Agregar Producto</title>
</head>
<body>

<h2>Agregar Producto</h2>

<form method="POST">

    Nombre:

    <input type="text" name="nombre">

    <br><br>

    Stock:

    <input type="number" name="stock">

    <br><br>

    Stock mínimo:

    <input type="number" name="stock_minimo">

    <br><br>

    Precio:

    <input type="number"
           step="0.01"
           name="precio">

    <br><br>

    Tipo:

    <select name="tipo">

        <option value="Electronico">
            Electrónico
        </option>

        <option value="Oficina">
            Oficina
        </option>

        <option value="Accesorio">
            Accesorio
        </option>

    </select>

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
